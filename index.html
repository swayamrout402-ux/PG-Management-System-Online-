<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>PG Management - Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- TOP CENTER HEADING -->
    <div class="page-header">
        <h1>PG Management System</h1>
    </div>

    <div class="auth-container">
        <h2>Login</h2>

        <!-- ROLE TOGGLE -->
        <div class="role-toggle">
            <button id="tenantBtn" class="active">Tenant</button>
            <button id="adminBtn">Admin</button>
        </div>

        <!-- LOGIN / REGISTER FORM -->
        <form id="authForm">
            <input type="text" id="name" placeholder="Full Name" style="display:none">
            <input type="text" id="phone" placeholder="Phone Number" style="display:none">
            <input type="date" id="dob" placeholder="Date of Birth" style="display:none">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button type="submit">Login</button>
        </form>

        <!-- REGISTER TOGGLE -->
        <p id="toggleMode">Register</p>
        <p id="message" class="message"></p>
    </div>

    <!-- SCRIPT -->
    <script src="auth.js"></script>
</body>

</html>
